app-template:
  controllers:
    claude-code-openai-wrapper:
      type: deployment
      replicas: 1
      containers:
        app:
          # Built and published by the docker.yml workflow in the fork
          # at https://github.com/brandonros/claude-code-openai-wrapper.
          # Override `tag` to pin a specific upstream commit SHA (e.g. the
          # 12-char `sha-abc1234...` produced by docker/metadata-action)
          # instead of the floating `latest`.
          image:
            repository: ghcr.io/brandonros/claude-code-openai-wrapper
            tag: latest
            pullPolicy: IfNotPresent
          # Upstream Dockerfile's CMD runs uvicorn with --reload for dev; strip
          # it for production pods.
          command: ["poetry", "run", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            CLAUDE_AUTH_METHOD: "api_key"
            # Agent's working directory for clones, builds, scratch files.
            # Backed by the persistence.workspace volume below.
            CLAUDE_CWD: "/workspace"
            # Route the Anthropic SDK through OpenRouter. Unset this (or set to
            # https://api.anthropic.com) to go direct to Anthropic; in that
            # case the secret's ANTHROPIC_API_KEY must be an Anthropic key
            # instead of an OpenRouter one.
            ANTHROPIC_BASE_URL: "https://openrouter.ai/api"
            # Wrapper's default is 10 chat completions/min per IP — fine for
            # a shared server, too aggressive for single-user self-hosted.
            RATE_LIMIT_ENABLED: "false"
          envFrom:
            - secretRef:
                name: claude-code-openai-wrapper-secrets
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: 8000
                initialDelaySeconds: 20
                periodSeconds: 10
                # Slow Claude calls shouldn't trip liveness mid-request.
                timeoutSeconds: 5
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: 8000
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 3
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: 8000
                failureThreshold: 30
                periodSeconds: 5
          # Each request spawns a Claude agent subprocess; size for
          # concurrency. Anthropic suggests ~1 CPU / 1Gi RAM per SDK instance
          # as a floor — bump limits if you see OOMKills.
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi

  service:
    app:
      controller: claude-code-openai-wrapper
      ports:
        http:
          port: 8000

  # Not exposed publicly by default — Open WebUI reaches it via ClusterIP.
  ingress:
    app:
      enabled: false

  persistence:
    # Agent's workspace: where Claude Code clones repos, runs builds, writes
    # scratch files. Ephemeral by default — override `type` to
    # `persistentVolumeClaim` with an `accessMode` + `size` if you want the
    # agent to remember prior clones / build caches across restarts.
    workspace:
      enabled: true
      type: emptyDir
      sizeLimit: 5Gi
      # type: persistentVolumeClaim
      # accessMode: ReadWriteOnce
      # size: 50Gi
      globalMounts:
        - path: /workspace
    # Separate /tmp for Python tempfile, uvicorn request scratch, etc.
    tmp:
      enabled: true
      type: emptyDir
      sizeLimit: 2Gi
      globalMounts:
        - path: /tmp
    # Mount your CLAUDE.md, skills, and .mcp.json from ConfigMaps created
    # out-of-band (or templated into this chart later). Enable by flipping
    # `enabled: true` and creating the matching ConfigMap.
    claude-md:
      enabled: false
      type: configMap
      name: claude-md
      globalMounts:
        - path: /workspace/CLAUDE.md
          subPath: CLAUDE.md
          readOnly: true
    skills:
      enabled: false
      type: configMap
      name: claude-skills
      globalMounts:
        - path: /root/.claude/skills
          readOnly: true
    mcp-config:
      enabled: false
      type: configMap
      name: claude-mcp-config
      globalMounts:
        - path: /root/.claude/.mcp.json
          subPath: .mcp.json
          readOnly: true
