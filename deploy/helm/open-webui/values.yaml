app-template:
  controllers:
    open-webui:
      type: deployment
      replicas: 1
      # SQLite on a single PVC — two replicas would fight over the DB file.
      strategy: Recreate
      containers:
        app:
          image:
            repository: ghcr.io/open-webui/open-webui
            tag: main
            pullPolicy: IfNotPresent
          env:
            # Point the UI at the wrapper Service inside the cluster.
            OPENAI_API_BASE_URLS: "http://claude-code-openai-wrapper:8000/v1"
            OPENAI_API_KEYS: "dummy"
            WEBUI_AUTH: "true"
            ENABLE_OLLAMA_API: "false"
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: 8080
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 5
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: 8080
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 3
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: 8080
                failureThreshold: 30
                periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi

  service:
    app:
      controller: open-webui
      ports:
        http:
          port: 8080

  ingress:
    app:
      enabled: false
      className: nginx
      annotations: {}
      hosts:
        - host: openwebui.example.com
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
                port: http
      tls: []

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 10Gi
      # storageClass: ""  # unset = cluster default
      globalMounts:
        - path: /app/backend/data
